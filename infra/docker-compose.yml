# Single-node Kafka (KRaft) + Kafka Connect with Debezium Postgres source
# and Confluent S3 Sink. Runs on one EC2 instance alongside the Python
# ingestion script. JVM heaps are deliberately tight because Phase 1
# targets a free-tier t3.micro (1 GB RAM); bump heaps if you graduate
# to t3.small or larger.

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # KRaft requires a base64-encoded 16-byte UUID (22 chars, no padding).
      # Generated once with:
      #   python3 -c "import base64, uuid; print(base64.urlsafe_b64encode(uuid.uuid4().bytes).rstrip(b'=').decode())"
      CLUSTER_ID: "VcqHS-osTxu6Mo-xgJAEig"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    container_name: connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      # IAM: S3 sink picks up AWS credentials from the EC2 instance profile
      # via the default credentials chain — no static keys mounted into the
      # container. AWS_REGION is just a default; the sink config sets s3.region
      # explicitly too.
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      # Allow connector configs to reference ${env:VAR} from the process env.
      CONNECT_CONFIG_PROVIDERS: "env"
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: "org.apache.kafka.common.config.provider.EnvVarConfigProvider"
      # Passed through so ${env:...} substitution works in connector configs.
      PG_HOST: "${PG_HOST}"
      PG_PORT: "${PG_PORT:-5432}"
      PG_DATABASE: "${PG_DATABASE}"
      DEBEZIUM_PG_PASSWORD: "${DEBEZIUM_PG_PASSWORD}"
      S3_BUCKET: "${S3_BUCKET}"
    restart: unless-stopped

volumes:
  kafka-data:
